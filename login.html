<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Pulse Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-card{
width:380px;
padding:40px;
border-radius:25px;
background:white;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.login-card h2{
text-align:center;
margin-bottom:25px;
color:#203a43;
}

input{
width:100%;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
transition:0.2s;
}

input:focus{
border-color:#2c5364;
box-shadow:0 0 0 3px rgba(44,83,100,0.2);
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#2c5364;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1f3c4a;
}

.switch{
text-align:center;
margin-top:18px;
font-size:14px;
color:#444;
cursor:pointer;
}

.switch span{
color:#2c5364;
font-weight:600;
}

.code-display{
margin-top:15px;
padding:12px;
background:#eef6fb;
border-radius:12px;
text-align:center;
font-weight:600;
color:#2c5364;
}
</style>
</head>

<body>

<div class="login-card">
<h2>💙 Family Pulse</h2>

<input type="text" id="name" placeholder="Your Name">

<div id="familyCodeInput" style="display:none;">
<input type="text" id="familyCode" placeholder="Enter Family Code">
</div>

<button onclick="handleAction()">Create Family</button>

<div class="switch">
Already have a family? <span onclick="toggleMode()">Join here</span>
</div>

<div id="generatedCode" class="code-display" style="display:none;"></div>

</div>

<script>

let mode="create";

function toggleMode(){
mode = mode==="create" ? "join" : "create";

document.querySelector("button").innerText =
mode==="create" ? "Create Family" : "Join Family";

document.getElementById("familyCodeInput").style.display =
mode==="join" ? "block" : "none";

document.querySelector(".switch").innerHTML =
mode==="create"
? 'Already have a family? <span onclick="toggleMode()">Join here</span>'
: 'Want to create new? <span onclick="toggleMode()">Create here</span>';
}

function generateCode(){
return "FP-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

function handleAction(){

let name=document.getElementById("name").value.trim();
if(!name){
alert("Enter your name");
return;
}

let families=JSON.parse(localStorage.getItem("families"))||{};

if(mode==="create"){

let code=generateCode();

families[code]={
admin:name,
members:[]
};

localStorage.setItem("families",JSON.stringify(families));

localStorage.setItem("currentUser",JSON.stringify({
name:name,
familyCode:code,
role:"admin"
}));

document.getElementById("generatedCode").style.display="block";
document.getElementById("generatedCode").innerText="Your Family Code: "+code;

setTimeout(()=>{
window.location.href="dashboard.html";
},1500);

}else{

let code=document.getElementById("familyCode").value.trim();

if(!families[code]){
alert("Invalid Family Code");
return;
}

localStorage.setItem("currentUser",JSON.stringify({
name:name,
familyCode:code,
role:"member"
}));

window.location.href="dashboard.html";
}

}
</script>

</body>
</html>
